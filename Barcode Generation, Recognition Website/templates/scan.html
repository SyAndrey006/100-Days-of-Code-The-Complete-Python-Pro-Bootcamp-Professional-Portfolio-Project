<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Barcode Site</title>
    <link rel="stylesheet" href="/static/style.css">

</head>
<body>
    <nav class="navbar">
        <div class="logo">BarcodeSite</div>

        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/scan">Scan Barcode</a></li>
            <li><a href="/generate">Generate Barcode</a></li>
        </ul>
    </nav>

    <div class="scan-container">
        <h1>Scan a Barcode</h1>
        <form action="/scan" method="POST" enctype="multipart/form-data">
            <input type="file" name="barcode_image" accept="image/*" required>
            <button type="submit">Scan</button>
        </form>

        {% if result %}
            <div class="result">
                <h2>Result:</h2>
                <p>{{ result }}</p>
            </div>
        {% endif %}
    </div>

</body>
</html>
