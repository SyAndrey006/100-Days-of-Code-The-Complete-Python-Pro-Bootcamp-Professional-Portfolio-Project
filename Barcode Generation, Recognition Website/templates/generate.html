<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Barcode Site</title>
    <link rel="stylesheet" href="/static/style.css">

</head>
<body>
    <nav class="navbar">
        <div class="logo">BarcodeSite</div>

        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/scan">Scan Barcode</a></li>
            <li><a href="/generate">Generate Barcode</a></li>
        </ul>
    </nav>

    <h2>Generate Code 128 Barcode</h2>

    <form method="POST">
        <input type="text"
               name="barcode_text"
               placeholder="Enter letters and numbers"
               required>
        <button type="submit">Generate</button>
    </form>

    {% if barcode_image %}
        <h3>Result:</h3>
        <img src="data:image/png;base64,{{ barcode_image }}">
    {% endif %

</body>
</html>
